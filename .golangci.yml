version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gocyclo
    - dupl
  exclusions:
    rules:
      # Preset chains intentionally share structure (CB -> Retry -> Timeout)
      # across HTTPClient / DatabaseQuery / RPCDownstream. Tuning differs;
      # extracting a shared helper would obscure each preset's intent.
      - path: middleware/presets\.go
        linters:
          - dupl

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
