name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test -v -race ./...

    - name: Install nox
      run: |
        go install github.com/nox-hq/nox/cli@v0.8.1
        mv "$(go env GOPATH)/bin/cli" "$(go env GOPATH)/bin/nox"

    - name: Generate release SBOM
      # nox scan exits non-zero when findings exist (even baselined ones in
      # source-built binaries). Release SBOM generation should not gate on
      # findings — the security CI job already enforces that. Tolerate the
      # exit code; verify artifacts in the next step.
      run: |
        mkdir -p release-artifacts
        nox -format cdx,spdx -output release-artifacts scan . || true
        test -s release-artifacts/sbom.cdx.json
        test -s release-artifacts/sbom.spdx.json

    - name: Generate changelog
      id: changelog
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

        # Extract changelog for this version
        sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        body_path: release_notes.md
        files: |
          release-artifacts/sbom.cdx.json
          release-artifacts/sbom.spdx.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}