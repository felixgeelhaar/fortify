name: Changelog

on:
  # Weekly refresh + manual trigger only. Running on every push triggers
  # PR-creation loops (merge of PR opens a new PR for next commit).
  schedule:
    - cron: "0 6 * * MON"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Refresh CHANGELOG Unreleased
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(changelog)')"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --unreleased --prepend CHANGELOG.md

      - name: Open PR with refreshed changelog
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(changelog): refresh Unreleased"
          title: "chore(changelog): refresh Unreleased"
          body: |
            Auto-generated by `git-cliff` from conventional commits since the last tag.

            Review and edit before merging if needed.
          branch: chore/changelog-refresh
          delete-branch: true
