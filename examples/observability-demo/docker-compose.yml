# A self-contained observability stack for trying Fortify metrics
# end-to-end. Brings up:
#
#   - sample app:    Go service exposing /metrics from fortify/metrics.
#   - Prometheus:    scraping the sample app.
#   - Grafana:       provisioned with the Prometheus datasource and a
#                    pre-built Fortify overview dashboard.
#
# Usage:
#
#   cd examples/observability-demo
#   docker compose up --build
#
# Then open http://localhost:3000 and log in with admin / admin. The
# "Fortify overview" dashboard is pre-loaded under General.

services:
  app:
    build:
      context: ../..
      dockerfile: examples/observability-demo/Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/metrics"]
      interval: 5s
      timeout: 2s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
